{{ $data := index site.Data site.Language.Lang }}

{{ if $data.cta.cta.enable }}
    {{ with $data.cta.cta }}
        <section class="section section-bg" id="about">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12 text-center">
                        <h2>{{ .title | markdownify }}</h2>
                        <p>{{ .content | markdownify }}</p>
                    </div>
                </div>
            </div>
        </section>
    {{ end }}
{{ end }}
